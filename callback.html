<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GigantoStudio — Authorization</title>
<style>body{font-family:Georgia,serif;max-width:720px;margin:60px auto;padding:0 20px;line-height:1.7;color:#222;text-align:center}code{display:inline-block;background:#f4f1ea;border:1px solid #ddd;border-radius:6px;padding:10px 16px;font-size:1.05em;word-break:break-all;margin-top:.6em}footer{margin-top:4em;color:#777;font-size:.9em}</style>
</head>
<body>
<h1>Authorization complete</h1>
<p id="msg">Reading authorization response…</p>
<p><code id="code">—</code></p>
<p style="color:#777;font-size:.9em">Copy the code above back into the GigantoStudio publisher tool.</p>
<script>
var p = new URLSearchParams(location.search);
var c = p.get('code');
document.getElementById('code').textContent = c || '(no code in URL)';
document.getElementById('msg').textContent = c
  ? 'Authorization code received:'
  : (p.get('error') ? 'Authorization error: ' + p.get('error') : 'No authorization data in this URL.');
</script>
<footer>© 2026 GigantoStudio · <a href="index.html">Home</a></footer>
</body>
</html>
